<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원 가입</h1>
    <form action="#" method="get">
        <ul>
            <li>
                <div>필수항목</div>
            </li>
            <li>
                <label for="id">아이디<sup>*</sup></label>
                <input type="text" name="id">
            </li>
            <li>
                <label for="pass">비밀번호<sup>*</sup></label>
                <input type="paassword" name="pass">
            </li>
            <li>
                <label for="email">이메일<sup>*</sup></label>
                <input type="text" name="email" placeholder="example@example.com">
            </li>
            <li>
                <label for="name">이름<sup>*</sup></label>
                <input type="text" name="name" placeholder="홍길동">
            </li>
            <li>
                <label for="age">나이<sup>*</sup></label>
                <input type="text" name="age">
            </li>
            <li>
                <div>당신에 대해서 알고 싶어요!</div>
            </li>
            <li>
                <label for="hobby">취미를 선택해 주세요</label>
                <input type="radio" name="hobby" value="game"><span>게임하기</span>
                <input type="radio" name="hobby" value="music"><span>음악듣기</span>
                <input type="radio" name="hobby" value="icedrink"><span>아이스음료 마시기</span>
            </li>
            <li>
                <label for="drink">좋아하는 음료를 선택해 주세요.(중복선택가능)</label>
                <input type="checkbox" name="drink" value="shake"><span>쉐이크 종류 음료</span>
                <input type="checkbox" name="drink" value="tea"><span>티 종류 음료</span>
                <input type="checkbox" name="drink" value="coffee"><span>커피 종류 음료</span>
            </li>
            <li>
                <label for="">동아리 참석 가능 날짜:</label>
                <input type="date">
            </li>
            <li>
                <label for="group">얼.줄.아에서 참여하고 싶은 모임</label>
                <select name="group" id="group">
                    <option value="">선택해주세요</option><span>--선택해주세요--</span>
                    <option value="">game</option><span>게임하기</span>
                    <option value="">music</option><span>음악듣기</span>
                    <option value="">running</option><span>달리기</span>
            </li>
            <li>
                <label for="portfolio">포트폴리오 제출하기</label>
                <button type="button">포트폴리오 업로드</button>
                <input type="file" name="portfolio">
            </li>
            <li>
                <label for="intro">마지막으로 하고 싶은 말은?</label>
                <textarea name="intro" id="intro" placeholder="50자 이내로 작성해 주세요" cols="50px" rows="10px"></textarea>
            </li>
            <li>
                <button type="reset">다시하기</button>
                <button>제출하기</button>
            </li>
        </ul>
    </form>
</body>
</html>
