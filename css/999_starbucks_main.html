<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Menu</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Nanum Gothic';
            /* background-color: rgb(246, 245, 239); */
        }
        header {
            /* border: 1px solid red; */
            width: 1000px;
            margin: auto;
            display: flex;  
            justify-content: space-between;          
        }
        .header-menu-top ul, 
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
        }
        .header-menu-top ul { 
            gap: 20px;
            font-size: .9rem;
        }
        .header-menu-bottom ul { gap: 30px; }
        .header-menu-top ul a, 
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a {
            letter-spacing: .5px;
            font-size: .9rem;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            font-size: 1.5rem;
            font-weight: 700;
            background-color: white;
        }
        .header-menu-top li:last-child input{
            display: none;
        }
        .container {
            width: 100%;
            height: 500px;
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
        }
        

        .img1, .img2, .img3, .img4, .img5, .slogan {
            opacity: 0;
            animation: fadeInUp 5s ease forwards;
            border: 1px solid red;
            position: absolute;
        }
        .img1 {
            animation-delay: 1s;
            width: 216px;
            height: 358px;
            opacity: 1;
            top: 100px;
            left: 650px;
        }
        .img2 {
            animation-delay: 2s;
            width: 210px;
            height: 300px;
            opacity: 1;
            top: 158px;
            left: 830px;
        }
        .img3 {
            animation-delay: 3s;
            width: 260px;
            height: 378px;
            opacity: 1;
            top: 100px;
            left: 950px;
        }
        .img4 {
            animation-delay: 4s;
            width: 214px;
            height: 378px;
            opacity: 1;
            top: 100px;
            left: 1170px;
        }
        .img5 {
            animation-delay: 5s;
            width: 220px;
            height: 428px;
            opacity: 1;
            top: 100px;
            left: 1330px;
        }
        .slogan {
            width: 400px;
            height: 100px;
            opacity: 1;
            top: 50px;
            left: 0px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                /* transform: translateY(50px); */
            }
            to {
                opacity: 1;
            }
        }
        .main-visual-slogan, .btn_slogan {
            position: absolute;
            width: 23.5%;
            left: 11.4%;
        }
        .main-visual-slogan {
            top: 34.83%;
        }
        .btn_slogan {
            z-index: 10;
            top: 50%;
            left: 11%;
            text-align: center;
        }
        .btn_slogan a {
            width: 25.053%;
            min-width: 125px;
            padding: 10px 20px;
            margin: 0;
            color: #ac85ba;
            border: 2px solid #ac85ba;
            border-radius: 7px;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text">
                        <a href="#"><i class="fa-brands fa-sistrix"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>   
    <main>
        <div class="container">
            <div class="main-visual-slogan">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" alt="main-visual-slogan" class="slogan">
            </div>
            <div class="main-visual-wrapper">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="슈트림 라떼" class="img1">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="슈 폼 라떼" class="img2">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="슈크림 말차 라떼" class="img3">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="슈크림 딸기 라떼" class="img4">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="체리 블라썸 백도 크림 프라프치노" class="img5">
            </div> 
        </div>
        <div class="btn_slogan">
            <a href="https://www.starbucks.co.kr/whats_new/campaign_view.do?pro_seq=3296">자세히 보기</a>
        </div>
    </main>

</body>
</html>
